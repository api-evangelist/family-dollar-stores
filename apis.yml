description: >-
  Family Dollar is a chain of discount variety stores in the United States
  offering a broad assortment of merchandise including consumables, home
  products, apparel, and seasonal goods at low prices. Owned by Dollar Tree,
  Inc., Family Dollar operates thousands of locations across the country and
  serves millions of customers seeking value-oriented shopping. The company
  does not currently publish public APIs or a developer portal.
